name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Angular App
        run: npm run build

      - name: Rename CSR Index File
        run: |
          cp dist/AuctionFrontendApp/browser/index.csr.html dist/AuctionFrontendApp/browser/index.html

      - name: Verify Build Output
        run: |
          ls -la dist/AuctionFrontendApp/browser

      - name: Deploy to Azure Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_WONDERFUL_COAST_061CAAC1E }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}

          action: "upload"

          app_location: "dist/AuctionFrontendApp/browser"

          skip_app_build: true