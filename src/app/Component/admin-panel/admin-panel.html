<div class="admin-page">

  <!-- Header -->
  <div class="page-header">
    <div>
      <h2>Admin Management</h2>
      <p>Manage all registered admins and users</p>
    </div>
    <button class="add-btn" (click)="openRegister()">
      <span>＋</span> Add Admin
    </button>
  </div>

  <!-- Loader -->
  @if (isLoading) {
    <div class="loader">
      <mat-spinner diameter="44"></mat-spinner>
    </div>
  }

  <!-- Table -->
  @if (!isLoading) {
    <div class="table-wrapper">
      <table mat-table [dataSource]="dataSource" class="admin-table">

        <!-- No -->
        <ng-container matColumnDef="no">
          <th mat-header-cell *matHeaderCellDef>#</th>
          <td mat-cell *matCellDef="let row; let i = index">{{ i + 1 }}</td>
        </ng-container>

        <!-- Name -->
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let row">
            <div class="name-cell">
              <div class="avatar">{{ row.name?.[0]?.toUpperCase() }}</div>
              {{ row.name }}
            </div>
          </td>
        </ng-container>

        <!-- Email -->
        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef>Email</th>
          <td mat-cell *matCellDef="let row">{{ row.email }}</td>
        </ng-container>

        <!-- Mobile -->
        <ng-container matColumnDef="mobile">
          <th mat-header-cell *matHeaderCellDef>Mobile</th>
          <td mat-cell *matCellDef="let row">{{ row.mobile || '—' }}</td>
        </ng-container>

        <!-- Role -->
        <ng-container matColumnDef="role">
          <th mat-header-cell *matHeaderCellDef>Role</th>
          <td mat-cell *matCellDef="let row">
            <span class="role-badge" [class]="row.role?.toLowerCase()">{{ row.role }}</span>
          </td>
        </ng-container>

        <!-- Actions -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let row">
            <button mat-icon-button class="edit-btn" matTooltip="Edit"
                    (click)="openEdit(row)">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button class="delete-btn" matTooltip="Delete"
                    (click)="openDelete(row)">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

        <!-- Empty state -->
        <tr class="mat-row" *matNoDataRow>
          <td class="empty-cell" [attr.colspan]="displayedColumns.length">No admins found.</td>
        </tr>

      </table>
    </div>
            <!-- Pagination -->
  <mat-paginator
    [pageSize]="5"
    [pageSizeOptions]="[5, 10, 20, 50]"
    showFirstLastButtons>
  </mat-paginator>
  }

</div>
