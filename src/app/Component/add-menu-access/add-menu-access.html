<h2 mat-dialog-title>Menu Access - {{ roleName }}</h2>

<mat-dialog-content>
  @if (loading) {
    <div class="loader"><mat-spinner diameter="40"></mat-spinner></div>
  }

  @if (errorMsg) {
    <div class="error-box"><mat-icon>error</mat-icon> {{ errorMsg }}</div>
  }

  @if (!loading) {
    <div class="table-wrapper">
      <table mat-table [dataSource]="rows" class="access-table">

        <ng-container matColumnDef="no">
          <th mat-header-cell *matHeaderCellDef>#</th>
          <td mat-cell *matCellDef="let row; let i = index">{{ i + 1 }}</td>
        </ng-container>

        <ng-container matColumnDef="menuName">
          <th mat-header-cell *matHeaderCellDef>Menu</th>
          <td mat-cell *matCellDef="let row">
            <div class="menu-cell">
              <mat-icon>{{ row.menu.icon || 'menu' }}</mat-icon>
              <span>{{ getMenuName(row.menu) }}</span>
            </div>
          </td>
        </ng-container>

        <!-- <ng-container matColumnDef="parentMenu">
          <th mat-header-cell *matHeaderCellDef>Parent</th>
          <td mat-cell *matCellDef="let row">{{ getParentMenu(row.menu) }}</td>
        </ng-container>

        <ng-container matColumnDef="route">
          <th mat-header-cell *matHeaderCellDef>Route</th>
          <td mat-cell *matCellDef="let row">{{ getRoute(row.menu) }}</td>
        </ng-container> -->

        <ng-container matColumnDef="access">
          <th mat-header-cell *matHeaderCellDef>Access</th>
          <td mat-cell *matCellDef="let row">
            <span class="access-badge" [class.active]="row.access">
              {{ row.access ? 'Allowed' : 'Not Allowed' }}
            </span>
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let row">
            @if (row.access) {
              <button mat-stroked-button class="remove-btn" [disabled]="isUpdating(row)" (click)="removeAccess(row)">
                @if (isUpdating(row)) { <mat-spinner diameter="16"></mat-spinner> } @else { <mat-icon>remove_circle</mat-icon> }
                <span>Remove Access</span>
              </button>
            } @else {
              <button mat-flat-button class="add-btn" [disabled]="isUpdating(row)" (click)="addAccess(row)">
                @if (isUpdating(row)) { <mat-spinner diameter="16"></mat-spinner> } @else { <mat-icon>add_circle</mat-icon> }
                <span>Add Access</span>
              </button>
            }
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        <tr class="mat-row" *matNoDataRow>
          <td class="empty-cell" [attr.colspan]="displayedColumns.length">No menus found.</td>
        </tr>

      </table>
    </div>
  }
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="close()">Close</button>
</mat-dialog-actions>
