<div class="panel-page">

  <div class="page-header">
    <div>
      <h2>Menu Management</h2>
      <p>Manage application menus</p>
    </div>
    <button class="add-btn" (click)="openAdd()">
      <mat-icon>add</mat-icon>
      <span>Add Menu</span>
    </button>
  </div>

  @if (isLoading) {
    <div class="loader"><mat-spinner diameter="44"></mat-spinner></div>
  }

  @if (!isLoading) {
    <div class="table-wrapper">
      <table mat-table [dataSource]="dataSource" class="panel-table">

        <ng-container matColumnDef="no">
          <th mat-header-cell *matHeaderCellDef>#</th>
          <td mat-cell *matCellDef="let row; let i = index">{{ i + 1 }}</td>
        </ng-container>

        <ng-container matColumnDef="menuName">
          <th mat-header-cell *matHeaderCellDef>Menu</th>
          <td mat-cell *matCellDef="let row">
            <div class="name-cell">
              <div class="avatar"><mat-icon>{{ getIcon(row) }}</mat-icon></div>
              <div>{{ getMenuName(row) }}</div>
            </div>
          </td>
        </ng-container>

        <ng-container matColumnDef="icon">
          <th mat-header-cell *matHeaderCellDef>Icon</th>
          <td mat-cell *matCellDef="let row">{{ getIcon(row) }}</td>
        </ng-container>

        <ng-container matColumnDef="routeUrl">
          <th mat-header-cell *matHeaderCellDef>Route</th>
          <td mat-cell *matCellDef="let row">{{ getRoute(row) }}</td>
        </ng-container>

        <ng-container matColumnDef="parentMenu">
          <th mat-header-cell *matHeaderCellDef>Parent</th>
          <td mat-cell *matCellDef="let row">{{ getParentMenu(row) }}</td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let row">
            <button mat-icon-button class="edit-btn" matTooltip="Edit" (click)="openEdit(row)">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button class="delete-btn" matTooltip="Delete" (click)="openDelete(row)">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        <tr class="mat-row" *matNoDataRow>
          <td class="empty-cell" [attr.colspan]="displayedColumns.length">No menus found.</td>
        </tr>

      </table>
    </div>

    <mat-paginator
      [pageSize]="5"
      [pageSizeOptions]="[5, 10, 20, 50]"
      showFirstLastButtons>
    </mat-paginator>
  }

</div>
