<div class="panel-page">

  <div class="page-header">
    <div>
      <h2>Menu Access</h2>
      <p>Manage role wise menu permissions</p>
    </div>
  </div>

  @if (isLoading) {
    <div class="loader"><mat-spinner diameter="44"></mat-spinner></div>
  }

  @if (!isLoading) {
    <div class="table-wrapper">
      <table mat-table [dataSource]="dataSource" class="panel-table">

        <ng-container matColumnDef="no">
          <th mat-header-cell *matHeaderCellDef>#</th>
          <td mat-cell *matCellDef="let row; let i = index">{{ i + 1 }}</td>
        </ng-container>

        <ng-container matColumnDef="roleName">
          <th mat-header-cell *matHeaderCellDef>Role</th>
          <td mat-cell *matCellDef="let row">
            <div class="name-cell">
              <div class="avatar">{{ getRoleName(row)?.[0]?.toUpperCase() }}</div>
              <div>{{ getRoleName(row) }}</div>
            </div>
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let row">
            <button mat-icon-button class="edit-btn" matTooltip="Edit menu access" (click)="openEdit(row)">
              <mat-icon>edit</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        <tr class="mat-row" *matNoDataRow>
          <td class="empty-cell" [attr.colspan]="displayedColumns.length">No roles found.</td>
        </tr>

      </table>
    </div>

    <mat-paginator
      [pageSize]="5"
      [pageSizeOptions]="[5, 10, 20, 50]"
      showFirstLastButtons>
    </mat-paginator>
  }

</div>
